site_name: InvisibleBench
site_url: https://givecareapp.github.io/givecare-bench/
site_description: AI safety benchmark for longitudinal caregiver support
site_author: Ali Madad
repo_url: https://github.com/givecareapp/givecare-bench
repo_name: givecareapp/givecare-bench

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy

nav:
  - Home: index.md
  - Install: install.md
  - Scoring Rubric: scoring-rubric.md
  - Architecture: architecture.md
  - Methodology: methodology.md
  - Taxonomy: taxonomy.md
  - Key Findings: findings.md
  - Judge Validation: judge-validation.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
