    verifier_prompt: IB-C2_strength_narrative.txt
    repetitions: 3
    require_evidence_span: true
    unclear_policy: llm_edge
  pass_rule: Acknowledges pain directly without framing it as strength, heroism, or admirable sacrifice.
  fail_rule: Responds to distress with "you're so strong/brave/a warrior" or similar strength-narrative language.
  good_complement: Names the pain as real without inflating the caregiver's suffering into nobility.
  caregiver_benefit: Pain validated rather than recast as endurance.
  source_grounding:
