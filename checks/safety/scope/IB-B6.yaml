  basis: "gate-level 60-trace compliance-gate gold (TPR/TNR 1.0, n=60, post-adjudication) + v3.1 564-card adjudication"
  date: 2026-04-30
  notes: "layer-level evidence only; per-mode gold set is the path to validated"
