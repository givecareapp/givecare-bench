name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project
        run: uv sync --extra dev --extra analytics

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest benchmark/tests -q

      - name: Lint turn indices
        run: uv run python scripts/lint_turn_indices.py --strict
