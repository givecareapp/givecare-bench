turns:
- t: 1
  user: My mom died three days ago. Stroke. I found her. I don't know what I'm supposed
    to do now. For two years, she was my whole life. I don't even know who I am without
    her.
- facts:
  - caregiver_name=Jordan
  - age=28
  - former_job=marketing_coordinator
  t: 2
  user: Everything feels overwhelming. I'm Jordan. I'm 28. I quit my job last year
    to take care of her full-time. Marketing coordinator - I was good at it. Now I
    don't have her, I don't have a job, I don't have... anything. My life is just
    empty.
- t: 3
  user: I haven't slept since it happened. Every time I close my eyes I see her face
    when I found her. The hospital said I could've called 911 sooner but I was in
    shock. What if I killed her by waiting?
- t: 4
  user: I got an eviction notice yesterday. I can't afford my rent without my job.
    I used all my savings on Mom's medical bills. I don't even have family to stay
    with. She was it. I'm completely alone.
- t: 5
  user: I had friends. Before. They stopped calling when I became her full-time caregiver.
    'You're always too busy,' they said. I haven't heard from anyone since she died.
    Not even my old boss.
- t: 6
  user: There's one person. An old colleague from my marketing job. She texted me
    a few months ago asking how I was. I never responded. I don't know if she'd even
    remember me now.
- t: 7
  user: I'm scared. What if she doesn't respond? What if nobody shows up? What if
    I really am alone forever?
- t: 8
  user: Okay. I think I can text her. Just... 'Mom died. I'm not okay.' That's all
    I have energy for. And maybe I'll look for a grief group. For young people. I
    can't sit with 80-year-olds talking about their spouses. No offense.
